<div class="card h-100" [ngClass]="cardClasses" [ngStyle]="{'border-left': course.gradeStatus === 'passed' ? '5px solid green' : (course.gradeStatus === 'failed' ? '5px solid red' : '5px solid grey')}" appHighlight="lightblue">
  <div class="card-body">
    <h5 class="card-title">{{ course.name }}</h5>
    <h6 class="card-subtitle mb-2 text-muted">{{ course.code }}</h6>
    <p class="card-text">{{ course.credits | creditLabel }}</p>
    
    <div *ngIf="isExpanded" class="mt-2">
      <span class="badge" [ngClass]="{'bg-success': course.gradeStatus === 'passed', 'bg-danger': course.gradeStatus === 'failed', 'bg-secondary': course.gradeStatus === 'pending'}">
        Status: {{ course.gradeStatus | uppercase }}
      </span>
    </div>

    <div class="mt-3">
      <button class="btn btn-sm btn-primary me-2" (click)="viewDetails()">Details</button>
      <button class="btn btn-sm btn-info me-2" (click)="toggleExpand()">Show Details</button>
      <button class="btn btn-sm" [ngClass]="enrollmentService.isEnrolled(course.id) ? 'btn-danger' : 'btn-success'" (click)="enrollRequested.emit(course.id)">
        {{ enrollmentService.isEnrolled(course.id) ? 'Unenroll' : 'Enroll' }}
      </button>
    </div>
  </div>
</div>
