<div class="card my-4" *ngIf="course$ | async as course; else error">
  <div class="card-header bg-dark text-white">
    <h3>Course Details: {{ course.name }}</h3>
  </div>
  <div class="card-body">
    <p><strong>Code:</strong> {{ course.code }}</p>
    <p><strong>Credits:</strong> {{ course.credits }}</p>
    <p><strong>Status:</strong> {{ course.gradeStatus }}</p>
    <button class="btn btn-secondary" (click)="goBack()">Back to Directory</button>
  </div>
</div>
<ng-template #error>
  <div class="alert alert-danger my-4">
    Failed to load course details.
  </div>
</ng-template>
