<div class="col-md-8 mx-auto card p-4 my-4">
  <h3>Course Enrollment (Reactive Form)</h3>
  <div *ngIf="submitted" class="alert alert-success">
    Enrollment request submitted successfully!
  </div>
  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Student Name</label>
      <input type="text" class="form-control" formControlName="studentName">
      <div *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']" class="text-danger">Name is required.</div>
      <div *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']" class="text-danger">Name must be at least 3 characters.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Student Email</label>
      <input type="email" class="form-control" formControlName="studentEmail">
      <div *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']" class="text-danger">Email is required.</div>
      <div *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']" class="text-danger">Invalid email format.</div>
      <div *ngIf="enrollForm.get('studentEmail')?.pending" class="text-info">Checking email availability...</div>
      <div *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['emailTaken']" class="text-danger">Email is already taken.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Course ID</label>
      <input type="text" class="form-control" formControlName="courseId">
      <div *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']" class="text-danger">Course ID is required.</div>
      <div *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['noCourseCode']" class="text-danger">Course code starting with XX is not allowed.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Preferred Semester</label>
      <select class="form-select" formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Additional Courses</label>
      <button type="button" class="btn btn-sm btn-secondary mb-2 d-block" (click)="addCourse()">Add Another Course</button>
      <div formArrayName="additionalCourses">
        <div class="input-group mb-2" *ngFor="let ctrl of additionalCourses.controls; let i=index">
          <input type="text" class="form-control" [formControlName]="i" placeholder="Course Name">
          <button type="button" class="btn btn-danger" (click)="removeCourse(i)">Remove</button>
        </div>
      </div>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" formControlName="agreeToTerms">
      <label class="form-check-label">I agree to terms and conditions</label>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="enrollForm.invalid">Submit</button>
  </form>
</div>
