<div class="col-md-8 mx-auto card p-4 my-4">
  <h3>Course Enrollment (Template-Driven Form)</h3>
  <div *ngIf="submitted" class="alert alert-success">
    Enrollment request submitted successfully!
  </div>
  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    <div class="mb-3">
      <label class="form-label">Student Name</label>
      <input type="text" class="form-control" name="studentName" ngModel #nameCtrl="ngModel" required minlength="3">
      <div *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" class="text-danger">Name is required.</div>
      <div *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" class="text-danger">Name must be at least 3 characters.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Student Email</label>
      <input type="email" class="form-control" name="studentEmail" ngModel #emailCtrl="ngModel" required email>
      <div *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" class="text-danger">Email is required.</div>
      <div *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" class="text-danger">Invalid email format.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Course ID</label>
      <input type="number" class="form-control" name="courseId" ngModel #courseCtrl="ngModel" required>
      <div *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" class="text-danger">Course ID is required.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Preferred Semester</label>
      <select class="form-select" name="preferredSemester" ngModel="Odd" required>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="agreeToTerms" ngModel required>
      <label class="form-check-label">I agree to terms and conditions</label>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="enrollForm.resetForm()">Reset</button>
  </form>
</div>
