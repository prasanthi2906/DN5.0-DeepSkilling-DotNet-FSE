<div class="card my-4">
  <div class="card-header bg-primary text-white">
    <h3>Student Profile</h3>
  </div>
  <div class="card-body">
    <p><strong>Name:</strong> Keshav</p>
    <p><strong>Email:</strong> keshav@college.edu</p>
    <p><strong>Major:</strong> Full Stack Engineering (.NET)</p>
    
    <h4 class="mt-4">Enrolled Courses</h4>
    <ul class="list-group">
      <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let c of enrolledCourses">
        {{ c.name }} ({{ c.code }})
        <span class="badge bg-primary rounded-pill">{{ c.credits }} Credits</span>
      </li>
      <li class="list-group-item text-muted" *ngIf="enrolledCourses.length === 0">
        You are not enrolled in any courses yet.
      </li>
    </ul>
  </div>
</div>
